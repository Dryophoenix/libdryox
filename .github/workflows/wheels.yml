name: Build wheels

on:
    push:
        tags:
            - "v*"

jobs:
    build_wheels:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]

        steps:
            - uses: actions/checkout@v4

            - uses: pypa/cibuildwheel@v4.0.0
              with:
                  output-dir: dist

            - uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}
                  path: dist/*.whl

    publish:
        needs: build_wheels
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write

        steps:
            - uses: actions/download-artifact@v4
              with:
                  pattern: wheels-*
                  path: dist
                  merge-multiple: true

            - uses: pypa/gh-action-pypi-publish@release/v1
